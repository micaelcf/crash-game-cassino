_format_version: "3.0"

services:
  - name: games-service
    url: http://games:4001
    routes:
      - name: games-routes
        paths:
          - /games
        strip_path: true
      # Socket.IO transport. strip_path stays false so the upstream still sees
      # /socket.io/* — that is the path the socket.io server listens on.
      # Kong 3.x auto-handles the WebSocket upgrade for http/https routes.
      - name: games-socketio
        paths:
          - /socket.io
        strip_path: false
        protocols:
          - http
          - https

  - name: wallets-service
    url: http://wallets:4002
    routes:
      - name: wallets-routes
        paths:
          - /wallets
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - http://frontend:3000

      methods:
        - GET
        - POST
