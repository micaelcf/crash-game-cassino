_format_version: "3.0"

services:
  - name: games-service
    url: http://games:4001
    routes:
      # Catch-all for /games/* — strips `/games` so the upstream Nest
      # controllers (which mount at root: /bet, /bet/cashout, /bets/me,
      # /rounds/*, /leaderboard) match.
      - name: games-routes
        paths:
          - /games
        strip_path: true
        plugins:
          - name: rate-limiting
            config:
              minute: 120
              policy: local
              fault_tolerant: true
              hide_client_headers: false
      # Socket.IO transport. strip_path stays false so the upstream still sees
      # /socket.io/* — that is the path the socket.io server listens on.
      # Kong 3.x auto-handles the WebSocket upgrade for http/https routes.
      - name: games-socketio
        paths:
          - /socket.io
        strip_path: false
        protocols:
          - http
          - https

  - name: wallets-service
    url: http://wallets:4002
    routes:
      # Wallets exposes only GET /wallets/me — provisioning is implicit
      # (auto-ensure on read + on first debit). No public POST surface.
      # OPTIONS must be allowed so CORS preflight matches this route and the
      # global CORS plugin can answer it; without it Kong 404s the preflight
      # and the browser blocks the real GET.
      - name: wallets-routes
        paths:
          - /wallets
        methods:
          - GET
          - OPTIONS
        strip_path: true
        plugins:
          - name: rate-limiting
            config:
              minute: 120
              policy: local
              fault_tolerant: true
              hide_client_headers: false

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - http://frontend:3000
      methods:
        - GET
        - POST
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - Accept
      credentials: true
      max_age: 3600
