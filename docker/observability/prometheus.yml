global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: games
    metrics_path: /metrics
    static_configs:
      - targets: ["games:4001"]
        labels:
          service: games

  - job_name: wallets
    metrics_path: /metrics
    static_configs:
      - targets: ["wallets:4002"]
        labels:
          service: wallets
